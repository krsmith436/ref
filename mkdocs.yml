site_name: krsmith436 Knowledge Base
site_url: https://krsmith436.github.io/ref/

theme:
  name: material
  logo: img/logo.png
  favicon: img/favicon.ico
  
  features:
    - navigation.tabs      # Adds a top navigation bar
    - navigation.top       # "Back to top" button
    - search.share         # Allows sharing search results
    - search.highlight     # Highlight search terms on page
    - content.code.copy    # Adds a "Copy" button to code blocks

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.emoji
  
nav:
  - 🏠 Home: index.md
  - 🚂 Model Railroad:
      - Simple Computer Aided Railway Modeler (SCARM): mr/scarm.md
  - 📚 Reference Guides:
      - Markdown Cheatsheet: guides/markdown_reference.md
      - MkDocs Cheatsheet: guides/mkdocs_reference.md
      - GitHub Cheatsheet: guides/github_reference.md
      - Raspberry Pi Cheatsheet: guides/rpi_bash_reference.md
      - BASH/Python Time Cheatsheet: guides/rpi_time_reference.md
  - 🛠️ Technical Setup:
      - GitHub Headless Page with MkDocs: setup/github_headless_page.md
      - Pc Access to GitHub with SSH Key-Based Authentication: setup/github_ssh_pc_access.md
      - Pc Access to Pi with SSH Key-Based Authentication: setup/rpi_ssh_pc_access.md